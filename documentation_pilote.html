<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Documentation technique - PILOTE</title>
    <link rel="icon" href="assets/favicon.png" type="image/png" />
    <style>
      :root {
        --red: #b3122d;
        --red-dark: #8d0e23;
        --red-light: #fff1f3;
        --text: #25282d;
        --muted: #5f6670;
        --border: #dfe2e7;
        --page: #f5f6f8;
        --panel: #ffffff;
        --code: #f0f1f3;
        --success: #18794e;
        --warning: #a15c00;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        color: var(--text);
        background: var(--page);
        font-family: Arial, Helvetica, sans-serif;
        line-height: 1.55;
      }

      button {
        font: inherit;
      }

      .page-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 32px;
        min-height: 116px;
        padding: 24px 36px;
        color: #ffffff;
        background: #25282d;
        border-bottom: 6px solid var(--red);
      }

      .page-header img {
        width: min(310px, 45vw);
        height: auto;
        padding: 10px 14px;
        background: #ffffff;
      }

      .page-header-title {
        text-align: right;
      }

      .page-header-title p,
      .page-header-title h1 {
        margin: 0;
      }

      .page-header-title p {
        color: #e9eaec;
        font-size: 0.86rem;
        font-weight: 700;
        text-transform: uppercase;
      }

      .page-header-title h1 {
        margin-top: 4px;
        font-size: 1.8rem;
      }

      .documentation-layout {
        display: grid;
        grid-template-columns: 330px minmax(0, 1fr);
        min-height: calc(100vh - 116px);
      }

      .navigation-panel {
        padding: 24px 18px;
        overflow: auto;
        background: #ffffff;
        border-right: 1px solid var(--border);
      }

      .navigation-title {
        margin: 0 10px 16px;
        font-size: 1rem;
      }

      .navigation-list {
        display: grid;
        gap: 5px;
      }

      .navigation-button {
        width: 100%;
        padding: 10px 12px;
        color: var(--muted);
        background: transparent;
        border: 1px solid transparent;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 700;
        text-align: left;
      }

      .navigation-button:hover,
      .navigation-button:focus-visible {
        color: var(--red-dark);
        background: var(--red-light);
        outline: none;
      }

      .navigation-button.is-active {
        color: var(--red-dark);
        background: var(--red-light);
        border-color: #efb7c1;
      }

      .navigation-button[data-depth="1"] {
        padding-left: 30px;
      }

      .file-kind {
        display: inline-block;
        min-width: 42px;
        margin-right: 7px;
        color: var(--red);
        font-family: Consolas, "Courier New", monospace;
        font-size: 0.78rem;
      }

      .documentation-content {
        min-width: 0;
        padding: 34px;
      }

      .documentation-content:focus {
        outline: none;
      }

      .documentation-article {
        max-width: 1080px;
        margin: 0 auto;
      }

      .article-header,
      .content-card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
      }

      .article-header {
        padding: 28px;
        border-top: 6px solid var(--red);
      }

      .article-header h2,
      .article-header p {
        margin: 0;
      }

      .article-header h2 {
        font-size: 1.65rem;
      }

      .article-header p {
        margin-top: 10px;
        color: var(--muted);
      }

      .article-tag {
        display: inline-block;
        margin-top: 16px;
        padding: 5px 9px;
        color: var(--red-dark);
        background: var(--red-light);
        border: 1px solid #efb7c1;
        border-radius: 4px;
        font-size: 0.82rem;
        font-weight: 700;
      }

      .content-card {
        margin-top: 18px;
        padding: 22px;
      }

      .content-card h3 {
        margin: 0 0 12px;
        font-size: 1.12rem;
      }

      .content-card p {
        margin: 0 0 10px;
        color: var(--muted);
      }

      .content-card p:last-child {
        margin-bottom: 0;
      }

      .content-list {
        margin: 0;
        padding-left: 22px;
        color: var(--muted);
      }

      .content-list li + li {
        margin-top: 8px;
      }

      .information-table {
        width: 100%;
        margin-top: 10px;
        border-collapse: collapse;
      }

      .information-table th,
      .information-table td {
        padding: 11px 12px;
        border: 1px solid var(--border);
        text-align: left;
        vertical-align: top;
      }

      .information-table th {
        color: var(--text);
        background: #f0f1f3;
      }

      code {
        padding: 2px 5px;
        color: var(--red-dark);
        background: var(--code);
        border-radius: 4px;
        font-family: Consolas, "Courier New", monospace;
      }

      .notice {
        margin-top: 14px;
        padding: 14px 16px;
        color: var(--muted);
        background: #f7f7f8;
        border-left: 4px solid var(--red);
        border-radius: 4px;
      }

      .notice.success {
        border-left-color: var(--success);
      }

      .notice.warning {
        border-left-color: var(--warning);
      }

      @media (max-width: 850px) {
        .page-header {
          align-items: flex-start;
          flex-direction: column;
        }

        .page-header-title {
          text-align: left;
        }

        .documentation-layout {
          grid-template-columns: 1fr;
        }

        .navigation-panel {
          max-height: 330px;
          border-right: 0;
          border-bottom: 1px solid var(--border);
        }

        .documentation-content {
          padding: 22px 14px;
        }

        .information-table {
          display: block;
          overflow-x: auto;
        }
      }
    </style>
  </head>
  <body>
    <header class="page-header">
      <img src="assets/logo-header.png" alt="PILOTE" />
      <div class="page-header-title">
        <p>Application web locale</p>
        <h1>Documentation technique</h1>
      </div>
    </header>

    <div class="documentation-layout">

      </aside>

      <main id="documentation-content" class="documentation-content" tabindex="-1"></main>
    </div>

          sections: [

          ]

        data: {

          summary:

      const navigation = document.getElementById("documentation-navigation");
      const content = document.getElementById("documentation-content");

      navigationItems.forEach((item) => {
        const button = document.createElement("button");

        button.type = "button";
        button.className = "navigation-button";
        button.dataset.pageId = item.id;
        button.dataset.depth = item.depth;
        button.innerHTML =
          `<span class="file-kind">${item.kind}</span>` +
          `<span>${item.label}</span>`;
        button.addEventListener("click", () => showDocumentationPage(item.id));
        navigation.appendChild(button);
      });

      function showDocumentationPage(pageId) {
        const page = documentationPages[pageId];

        if (!page) {
          return;
        }

        document.querySelectorAll(".navigation-button").forEach((button) => {
          button.classList.toggle("is-active", button.dataset.pageId === pageId);
        });

        content.innerHTML = buildPageHtml(page);
        content.focus({ preventScroll: true });
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function buildPageHtml(page) {
        return `
          <article class="documentation-article">
            <header class="article-header">
              <h2>${page.title}</h2>
              <p>${page.summary}</p>
              <span class="article-tag">${page.kind}</span>
            </header>
            ${page.sections.map(buildSectionHtml).join("")}
          </article>
        `;
      }

      function buildSectionHtml(section) {
        const paragraphs = (section.paragraphs || [])
          .map((paragraph) => `<p>${paragraph}</p>`)
          .join("");
        const list = section.list
          ? `<ul class="content-list">${section.list
              .map((item) => `<li>${item}</li>`)
              .join("")}</ul>`
          : "";
        const table = section.table ? buildTableHtml(section.table) : "";
        const notice = section.notice
          ? `<div class="notice ${section.noticeType || ""}">${section.notice}</div>`
          : "";

        return `
          <section class="content-card">
            <h3>${section.title}</h3>
            ${paragraphs}
            ${list}
            ${table}
            ${notice}
          </section>
        `;
      }

      function buildTableHtml(table) {
        const tableHead = table.headers
          .map((header) => `<th>${header}</th>`)
          .join("");
        const tableRows = table.rows
          .map((row) => {
            return `<tr>${row.map((cell) => `<td>${cell}</td>`).join("")}</tr>`;
          })
          .join("");

        return `
          <table class="information-table">
            <thead><tr>${tableHead}</tr></thead>
            <tbody>${tableRows}</tbody>
          </table>
        `;
      }

      showDocumentationPage("overview");
    </script>
  </body>
</html>
